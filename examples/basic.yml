name: example-auth-basic
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: bridgedai-devsecops/auth-action@v1
        with:
          api-url: ${{ vars.BRIDGEDAI_API_URL }}
          tenant: ${{ vars.BRIDGEDAI_TENANT }}
          audience: ${{ vars.BRIDGEDAI_OIDC_AUDIENCE }}
          mode: production

